name: Docker Frontend

on:
  push:
    branches: ["main", "master"]
    paths:
      - "frontend/**"
      - ".github/workflows/docker-frontend.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Docker Hub config
        id: cfg
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "push_enabled=true" >> "$GITHUB_OUTPUT"
            echo "image=${{ secrets.DOCKERHUB_USERNAME }}/gasy-frontend" >> "$GITHUB_OUTPUT"
            echo "✅ Docker Hub secrets detected: image will be pushed."
          else
            echo "push_enabled=false" >> "$GITHUB_OUTPUT"
            echo "image=${{ github.repository_owner }}/gasy-frontend" >> "$GITHUB_OUTPUT"
            echo "⚠️ DOCKERHUB_USERNAME/DOCKERHUB_TOKEN missing: build only, push skipped."
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.cfg.outputs.push_enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.cfg.outputs.image }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ steps.cfg.outputs.push_enabled == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
