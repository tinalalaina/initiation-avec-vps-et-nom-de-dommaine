name: Build & Deploy Frontend

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/gasy-frontend:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/gasy-frontend:sha-${{ env.SHORT_SHA }}

      - name: Deploy frontend on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ${{ secrets.VPS_PATH }}

            # Assure un .env.vps propre (une seule ligne FRONTEND_IMAGE)
            sed -i '/^FRONTEND_IMAGE=/d' .env.vps
            printf "FRONTEND_IMAGE=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/gasy-frontend:latest\n" | cat - .env.vps > .env.tmp && mv .env.tmp .env.vps

            docker compose --env-file .env.vps -f docker-compose.vps.yml pull frontend
            docker compose --env-file .env.vps -f docker-compose.vps.yml up -d frontend
            docker compose --env-file .env.vps -f docker-compose.vps.yml ps
