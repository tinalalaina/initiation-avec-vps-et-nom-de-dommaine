name: Build & Deploy Frontend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      IMAGE_NAME: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/gasy-frontend
      SHORT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short sha
        run: echo "SHORT_SHA7=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ env.SHORT_SHA7 }}

      - name: Deploy frontend on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.VPS_PATH }}
            # garder latest pour éviter mismatch de tag
            sed -i '/^FRONTEND_IMAGE=/d' .env.vps
            echo "FRONTEND_IMAGE=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/gasy-frontend:latest" >> .env.vps

            docker compose --env-file .env.vps -f docker-compose.vps.yml pull frontend
            docker compose --env-file .env.vps -f docker-compose.vps.yml up -d frontend
            docker compose --env-file .env.vps -f docker-compose.vps.yml ps
